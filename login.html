<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitionInvest Login</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

button{
    background:#0b57d0;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="box">
<h2>BitionInvest</h2>

<p>Login with Google</p>

<button id="loginBtn">
Continue with Google
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBaEYh2FGQY87kSM2kSsvRBiq-UCiSwOvE",
authDomain: "bitioninvest2.firebaseapp.com",
projectId: "bitioninvest2",
storageBucket: "bitioninvest2.firebasestorage.app",
messagingSenderId: "871198239497",
appId: "1:871198239497:web:4b3378722c8b289d68c1d8",
measurementId: "G-M3KFRL4FF0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").addEventListener("click", async () => {
try{
await signInWithPopup(auth, provider);
window.location.href = "dashboard.html";
}catch(error){
alert("Login failed: " + error.message);
console.error(error);
}
});

</script>

</body>
</html>
