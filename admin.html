<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BitionInvest Admin</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
color:#FFD700;
}

.card{
background:#161b22;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
background:#FFD700;
color:black;
border:none;
padding:12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}

.balance{
color:#00ff88;
}

</style>

</head>


<body>


<div class="container">


<h1>BitionInvest Admin</h1>

<button id="logout">
Logout
</button>


<div id="adminInfo" class="card">
Checking admin...
</div>


<h2>Users</h2>

<div id="users">
Loading users...
</div>


</div>




<script type="module">


import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";


import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyBaEYh2FGQY87kSM2kSsvRBiq-UCiSwOvE",

authDomain: "bitioninvest2.firebaseapp.com",

projectId: "bitioninvest2",

storageBucket: "bitioninvest2.firebasestorage.app",

messagingSenderId: "871198239497",

appId: "1:871198239497:web:4b3378722c8b289d68c1d8",

measurementId: "G-M3KFRL4FF0"

};



const app = initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);



onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}


const adminRef=doc(db,"users",user.uid);

const adminSnap=await getDoc(adminRef);



if(!adminSnap.exists() || adminSnap.data().role!=="admin"){

alert("Access denied");

location="dashboard.html";

return;

}



document.getElementById("adminInfo").innerHTML=

`
<h3>${user.displayName}</h3>
<p>${user.email}</p>
`;



loadUsers();


});





async function loadUsers(){


const box=document.getElementById("users");

box.innerHTML="";


const snapshot=await getDocs(collection(db,"users"));



snapshot.forEach((item)=>{


const user=item.data();


box.innerHTML += `

<div class="card">


<h3>${user.name}</h3>

<p>${user.email}</p>


<p class="balance">
Current Balance: $${user.balance}
</p>



<label>
New Balance
</label>

<input id="balance-${item.id}" 
value="${user.balance}">



<label>
New Profit
</label>

<input id="profit-${item.id}" 
value="${user.profit}">



<label>
Plan
</label>


<select id="plan-${item.id}">

<option ${user.plan=="No Active Plan"?"selected":""}>
No Active Plan
</option>

<option ${user.plan=="Basic Plan"?"selected":""}>
Basic Plan
</option>

<option ${user.plan=="Premium Plan"?"selected":""}>
Premium Plan
</option>

</select>



<button onclick="saveUser('${item.id}')">
Save Changes
</button>


</div>

`;

});


}





window.saveUser = async(id)=>{


const balance=
Number(document.getElementById("balance-"+id).value);


const profit=
Number(document.getElementById("profit-"+id).value);


const plan=
document.getElementById("plan-"+id).value;



await updateDoc(doc(db,"users",id),{

balance:balance,

profit:profit,

plan:plan

});


alert("User updated successfully");


location.reload();


}





document.getElementById("logout").onclick=()=>{

signOut(auth);

location="login.html";

};



</script>


</body>

</html>
