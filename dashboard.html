<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BitionInvest Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:#0d1117;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
font-size:26px;
font-weight:bold;
color:#FFD700;
}

button{
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.logout{
background:#ff4444;
color:white;
}

.withdraw{
background:#FFD700;
color:black;
width:100%;
margin-top:15px;
}

.withdraw:disabled{
background:#555;
color:#aaa;
cursor:not-allowed;
}

.card{
background:#161b22;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

.profile{
background:#161b22;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.title{
color:#aaa;
font-size:14px;
}

.balance{
font-size:35px;
font-weight:bold;
color:#00ff88;
margin-top:10px;
}

.value{
font-size:22px;
margin-top:10px;
}

.plan{
color:#FFD700;
font-weight:bold;
}

</style>

</head>


<body>


<div class="container">


<div class="header">

<div class="logo">
BitionInvest
</div>

<button class="logout" id="logoutBtn">
Logout
</button>

</div>



<div class="profile">

<h3 id="username">
Loading...
</h3>

<p id="email"></p>

</div>



<div class="card">

<div class="title">
Available Balance
</div>

<div class="balance" id="balance">
$0.00
</div>

</div>




<div class="card">

<div class="title">
Today's Profit
</div>

<div class="value" id="profit">
$0.00
</div>

</div>




<div class="card">

<div class="title">
Active Plan
</div>

<div class="value plan" id="plan">
No Active Plan
</div>

</div>




<div class="card">

<div class="title">
Withdrawal
</div>


<div class="value" id="withdrawMessage">
Checking balance...
</div>


<button class="withdraw" id="withdrawBtn" disabled>
Request Withdrawal
</button>


</div>




</div>




<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";


import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyBaEYh2FGQY87kSM2kSsvRBiq-UCiSwOvE",

authDomain: "bitioninvest2.firebaseapp.com",

projectId: "bitioninvest2",

storageBucket: "bitioninvest2.firebasestorage.app",

messagingSenderId: "871198239497",

appId: "1:871198239497:web:4b3378722c8b289d68c1d8",

measurementId: "G-M3KFRL4FF0"

};



const app = initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);



onAuthStateChanged(auth, async(user)=>{


if(!user){

window.location="login.html";

return;

}



const userRef=doc(db,"users",user.uid);

const userSnap=await getDoc(userRef);



if(userSnap.exists()){


const data=userSnap.data();

const balance=Number(data.balance);



document.getElementById("username").innerHTML=
data.name;


document.getElementById("email").innerHTML=
data.email;


document.getElementById("balance").innerHTML=
"$"+balance.toFixed(2);


document.getElementById("profit").innerHTML=
"$"+Number(data.profit).toFixed(2);


document.getElementById("plan").innerHTML=
data.plan;



const withdrawBtn=document.getElementById("withdrawBtn");

const withdrawMessage=document.getElementById("withdrawMessage");



if(balance >= 500){


withdrawMessage.innerHTML=
"Withdrawal available";


withdrawBtn.disabled=false;


}else{


withdrawMessage.innerHTML=
"Minimum withdrawal balance is $500";


withdrawBtn.disabled=true;


}



}



});





document.getElementById("logoutBtn").onclick=()=>{


signOut(auth)
.then(()=>{

window.location="login.html";

});


};



</script>


</body>

</html>
