<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitionInvest Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:26px;
font-weight:bold;
color:#FFD700;
}

.card{
background:#161b22;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.balance{
font-size:34px;
font-weight:bold;
color:#00ff88;
margin-top:10px;
}

.profit{
color:#FFD700;
font-size:18px;
margin-top:8px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}

.withdraw{
background:#FFD700;
color:black;
}

.history{
margin-top:10px;
}

.item{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #333;
}

.status{
color:#00ff88;
}

.notice{
margin-top:25px;
font-size:14px;
color:#aaa;
text-align:center;
}
</style>

</head>

<body>

<div class="header">
<div class="logo">BitionInvest</div>
<div>👤 User</div>
</div>

<div class="card">

<h3>Available Balance</h3>

<div class="balance">$10,000.00</div>

<div class="profit">
Today's Profit: +$250.00
</div>

<button class="withdraw">
Request Withdrawal
</button>

</div>

<div class="card">

<h3>Active Plan</h3>

<p>Premium Plan</p>

<p style="margin-top:10px;">
Expected Return: 2% Daily
</p>

</div>

<div class="card">

<h3>Recent Transactions</h3>

<div class="history">

<div class="item">
<span> Profit</span>
<span class="status">+$250</span>
</div>

<div class="item">
<span>Withdrawal Request</span>
<span>Pending</span>
</div>

<div class="item">
<span>Welcome Bonus</span>
<span class="status">+$100</span>
</div>

</div>

</div>

<p class="notice">
This is an investment plartform to make earnings Daily
</p>

</body>
</html>
