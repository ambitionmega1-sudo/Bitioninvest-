<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BitionInvest Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
padding:20px;
margin:0;
}

.container{
max-width:500px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#FFD700;
font-size:26px;
font-weight:bold;
}

button{
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.logout{
background:#ff4444;
color:white;
}

.card{
background:#161b22;
padding:20px;
border-radius:15px;
margin-top:15px;
}

.title{
color:#aaa;
}

.balance{
font-size:35px;
color:#00ff88;
font-weight:bold;
margin-top:10px;
}

.value{
font-size:22px;
margin-top:10px;
}

.plan{
color:#FFD700;
font-weight:bold;
}

.withdraw{
background:#FFD700;
width:100%;
margin-top:15px;
}

.withdraw:disabled{
background:#555;
color:#aaa;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

</style>

</head>


<body>


<div class="container">


<div class="header">

<div class="logo">
BitionInvest
</div>

<button class="logout" id="logoutBtn">
Logout
</button>

</div>



<div class="card">

<h3 id="username">
Loading...
</h3>

<p id="email"></p>

</div>



<div class="card">

<div class="title">
Available Balance
</div>

<div class="balance" id="balance">
$0.00
</div>

</div>



<div class="card">

<div class="title">
Today's Profit
</div>

<div class="value" id="profit">
$0.00
</div>

</div>



<div class="card">

<div class="title">
Active Plan
</div>

<div class="value plan" id="plan">
No Active Plan
</div>

</div>



<div class="card">

<div class="title">
Withdrawal
</div>

<div class="value" id="withdrawMessage">
Checking balance...
</div>


<input 
id="withdrawAmount"
type="number"
placeholder="Enter amount to withdraw"
>


<button class="withdraw" id="withdrawBtn" disabled>
Request Withdrawal
</button>


</div>



</div>



<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";


import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



const firebaseConfig = {

apiKey:"AIzaSyBaEYh2FGQY87kSM2kSsvRBiq-UCiSwOvE",

authDomain:"bitioninvest2.firebaseapp.com",

projectId:"bitioninvest2",

storageBucket:"bitioninvest2.firebasestorage.app",

messagingSenderId:"871198239497",

appId:"1:871198239497:web:4b3378722c8b289d68c1d8"

};



const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);



let userBalance=0;



onAuthStateChanged(auth,async(user)=>{


if(!user){

location="login.html";

return;

}


const snap=await getDoc(
doc(db,"users",user.uid)
);



if(snap.exists()){


const data=snap.data();


userBalance=Number(data.balance);



document.getElementById("username").innerHTML=data.name;

document.getElementById("email").innerHTML=data.email;

document.getElementById("balance").innerHTML=
"$"+userBalance.toFixed(2);

document.getElementById("profit").innerHTML=
"$"+Number(data.profit).toFixed(2);

document.getElementById("plan").innerHTML=
data.plan;



if(userBalance>=500){

document.getElementById("withdrawMessage").innerHTML=
"Withdrawal available";

document.getElementById("withdrawBtn").disabled=false;

}else{

document.getElementById("withdrawMessage").innerHTML=
"Minimum withdrawal balance is $500";

}

}


});



document.getElementById("withdrawBtn").onclick=()=>{


const amount=
Number(document.getElementById("withdrawAmount").value);



if(amount>userBalance){

alert("Insufficient balance");

return;

}


alert("Withdrawal request feature will be connected next");


};



document.getElementById("logoutBtn").onclick=()=>{


signOut(auth)
.then(()=>{

location="login.html";

});


};



</script>


</body>

</html>
